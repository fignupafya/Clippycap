# =============================================================================
# Clippycap — default configuration  (THE single source of all defaults)
# =============================================================================
# This is a real, committed file — NOT defaults embedded in code. Code only ever
# reads from the merged config; there are no code-level fallbacks. The merge
# order is:  this file  ->  <data_dir>/local.toml  ->  CLIPPYCAP__* env vars.
# A missing or invalid key after the merge is a HARD startup error.
#
# Path tokens expanded by the config loader:
#   @appdata  -> OS app-data dir (%APPDATA% / ~/.config / ~/Library/Application Support)
#   @data     -> the resolved application data dir (see [app].data_dir below)
#   @install  -> the install / bundle directory
#   @bundled  -> directory of bundled tools (e.g. the packaged ffmpeg)
#
# (User data — tags, notes, references, sources, saved views — is NOT here; it
#  lives in SQLite and is edited in the UI. This file only *seeds* a few things.)
# -----------------------------------------------------------------------------

[app]
name              = "Clippycap"
# Where the SQLite db, local.toml, thumbnails, tag images, plugins and logs live.
data_dir          = "@appdata/Clippycap"
# On first run, write a commented copy of this file to <data_dir>/local.toml.
write_local_on_first_run = true

[server]
host              = "127.0.0.1"   # local only
port              = 0             # 0 = pick a free port automatically
# When false, the desktop shell opens a native window (pywebview) instead of a browser tab.
open_browser      = false

[shell]
# "pywebview" = native window (default).  "browser" = open the default browser instead.
mode              = "pywebview"
window_title      = "Clippycap"
window_width      = 1360
window_height     = 860
remember_window_state = true

[ui]
theme             = "dark"        # "dark" | "light"
accent_color      = "#ff6a2b"
grid_density      = "medium"      # "small" | "medium" | "large"
default_sort      = "recorded_desc"   # see [sort] for the available keys
locale            = "en"
markdown_in_notes = true
# How many clips one page of the library grid shows. The grid is paginated so it stays fast no
# matter how large the library grows -- only this many cards (and thumbnails) are ever in the DOM.
page_size         = 100           # 1..500

[scan]
recursive_default       = true    # default 'recursive' for newly added sources
follow_symlinks         = false
include_hidden_files    = false
ignored_globs           = ["desktop.ini", "Thumbs.db", ".DS_Store", "*.part", "*.tmp", "*.crdownload"]
# A file modified within this many seconds is skipped (it may still be being written, e.g. by OBS).
skip_modified_within_seconds = 15
# Scan all enabled sources automatically when the app starts.
scan_on_startup         = true
# Re-scan interval in minutes while running; 0 = only on demand / startup.
periodic_scan_minutes   = 0
# A scan works in two phases -- discovery (find + identify files) then enrichment (read each clip's
# duration / resolution). It commits, and so the new clips appear in the library grid, every this
# many files instead of only once at the very end -- so a large first scan streams in progressively
# and stays usable throughout. Smaller = smoother updates + more commits; larger = fewer commits. 1..10000.
commit_batch_size       = 32

[identity]
# Which IdentityStrategy to use. Built-in:
#   "blake3-composite" (default) -- identity = BLAKE3 over the file's exact byte size plus its first
#     `partial_hash_head_bytes` and last `partial_hash_tail_bytes`. Reads only ~128 KB per file
#     instead of every byte, so the first scan of a large library is many times faster; for real
#     video files it is as collision-free as a whole-file hash.
#   "blake3" -- a full-content BLAKE3 hash (reads every byte): slower to scan, an absolute whole-file
#     content hash. Switching strategy re-identifies the existing library once, in the background.
# Plugins may register more (e.g. "perceptual_video" -- robust to re-encoding/trimming).
strategy                = "blake3-composite"
# Bytes read from the start and end of each file by the "blake3-composite" strategy. The file's
# exact size is always hashed in too, so two files collide only if their size AND both ends match.
partial_hash_head_bytes = 65536
partial_hash_tail_bytes = 65536
# Use the NTFS volume + file id (when available) to avoid counting the same file twice
# when it is reachable via multiple paths / symlinks / junctions.
dedup_by_volume_file_id = true

[hash_cache]
enabled           = true          # cache (path,size,mtime) -> hash so re-scans don't re-hash unchanged files

[thumbnails]
cache_dir         = "@data/thumbnails"
format            = "webp"        # "webp" | "jpg" | "png"
width             = 480           # px; height derived from aspect ratio
# How many thumbnails to capture per video (a single poster, or several for a hover-scrub strip).
per_video_count   = 1
# As a fraction of duration, where to grab the poster frame (0.0–1.0).
poster_at_fraction = 0.25
regenerate_on_metadata_change = true

[media.ffmpeg]
# When false, ffmpeg/ffprobe are not used at all: thumbnails are captured client-side
# (a frame from the <video> element) and only browser-available metadata is recorded.
enabled           = true
# "auto"  -> search <data_dir>/bin (where an on-demand install / the installer puts a downloaded
#            build), then the bundle dir, then common install locations, then PATH.
# "@bundled" -> only the ffmpeg/ffprobe shipped next to the app.
# or an absolute path to ffmpeg.exe / ffprobe.exe.
ffmpeg_path       = "auto"
ffprobe_path      = "auto"
# When ffmpeg can't be located on startup, offer (once) to download a static build the first time the
# app opens. Once you decline this never re-prompts; you can still install it from Settings > FFmpeg.
# (Windows only -- elsewhere, install ffmpeg with your package manager.)
offer_install_if_missing = true

[media.video]
# File extensions recognised as videos by the built-in VideoMediaType.
extensions        = ["mp4", "mkv", "mov", "webm", "avi", "m4v", "ts", "flv", "wmv"]
# How to derive 'recorded_at' from a file name. Tried in order; first match wins.
# Tokens: %Y %m %d (date) and %H %M %S (time). Falls back to the file's mtime if none match.
recorded_at_filename_patterns = [
  "%Y-%m-%d %H-%M-%S",   # OBS default, e.g. "... 2026-05-09 19-36-44.mp4"
  "%Y-%m-%d_%H-%M-%S",
  "%Y%m%d_%H%M%S",
  "%Y%m%d-%H%M%S",
]
identity_strategy = "blake3-composite"   # may differ from the global default per media type

[player]
# Available playback speeds shown in the player UI.
speeds            = [0.1, 0.25, 0.5, 1.0, 1.5, 2.0]
default_speed     = 1.0
# Seconds to jump for the "skip back/forward" buttons; "fine" = the Shift+arrow small jump.
skip_seconds      = 5
skip_seconds_fine = 1
# When adding a timestamped note, pause playback.
pause_on_add_note = true
# Frame stepping: if true, use requestVideoFrameCallback when available; else seek by 1/fps.
prefer_rvfc       = true

[editing]
# Trimming / cutting clips with ffmpeg.
#  reencode = true  (default): re-encode the cut -> frame-accurate, so timestamped notes stay
#    aligned, and the output is a clean, browser-playable file; a bit slower + a tiny quality cost.
#  reencode = false: stream-copy (instant, lossless) but the cut START snaps to the nearest keyframe
#    before it -- the result can be ~1-2 s off, and notes that fall inside it shift by that much.
reencode               = true
reencode_crf           = 18           # 0–51, lower = better quality (only when reencode=true)
reencode_preset        = "veryfast"
# Trim / "remove segment" / "cut segment" overwrite the ORIGINAL file in place (there is no undo).
# When true, a copy of the pre-edit file is kept next to it first ("<name> (pre-edit backup)<ext>").
keep_original_backup   = false
# Name for the new clip produced by "save segment as new clip" / "cut segment to new clip".
# Placeholders: {stem} {start} {end} {ext}  — {start} and {end} are formatted "mm-ss".
new_clip_name_template = "{stem} [{start}-{end}]{ext}"
# Description shown on the reference auto-created from an extracted clip back to its source; "" disables it.
excerpt_reference_type = "excerpt of"

[keybindings]
# Player (in the Detail view)
play_pause        = "Space"
frame_prev        = ","
frame_next        = "."
skip_back         = "ArrowLeft"
skip_fwd          = "ArrowRight"
skip_back_fine    = "Shift+ArrowLeft"
skip_fwd_fine     = "Shift+ArrowRight"
speed_down        = "j"
speed_up          = "l"
toggle_play_k     = "k"
loop_set_a        = "a"
loop_set_b        = "b"
loop_toggle       = "shift+l"
mute_toggle       = "m"
fullscreen_toggle = "f"
add_note_at_time  = "n"
capture_frame     = "shift+s"
prev_asset        = "PageUp"
next_asset        = "PageDown"
seek_start        = "Home"
seek_end          = "End"
# Trimming / selection (in the Detail view)
sel_in            = "i"            # set the selection IN point at the current time
sel_out           = "o"            # set the selection OUT point at the current time
sel_clear         = "shift+i"      # clear the current selection
add_interval_note = "shift+n"      # add a note covering the current selection
# App
focus_search      = "ctrl+k"
open_tag_manager  = "ctrl+t"
quick_tag_prefix  = "1-9"          # press 1..9 to toggle the Nth tag (by sort_order)

[sort]
# Available sort keys for the grid and saved views (key -> human label).
recorded_desc     = "Recorded (newest first)"
recorded_asc      = "Recorded (oldest first)"
added_desc        = "Added (newest first)"
duration_desc     = "Duration (longest first)"
duration_asc      = "Duration (shortest first)"
title_asc         = "Title (A→Z)"
tag_count_desc    = "Tag count (most first)"
last_opened_desc  = "Last opened (most recent)"

[search]
# FTS5 over note bodies and asset titles.
fts_enabled       = true

[logging]
level             = "INFO"        # DEBUG | INFO | WARNING | ERROR
dir               = "@data/logs"
max_files         = 10
max_file_mb       = 5

[plugins]
# Directories scanned for plugins at startup (each plugin = a package exposing `register(context)`).
dirs              = ["@install/plugins", "@data/plugins"]
# Explicitly enabled plugins (empty list = none extra). Disabled wins over enabled.
enabled           = []
disabled          = []

# Reference relation types to SEED into the database on first run. After first run
# these are fully editable in the UI; this list is only the initial content.
# 'reverse' is optional — set it for a directed relation (shown differently on the two sides).
[[seed.reference_types]]
name    = "better version of"
reverse = "worse version of"
color   = "#56c271"
[[seed.reference_types]]
name    = "same mistake as"
color   = "#ef5b5b"
[[seed.reference_types]]
name    = "see also"
color   = "#4fb6f0"
[[seed.reference_types]]
name    = "continues from"
reverse = "continued in"
color   = "#b78bf0"
[[seed.reference_types]]
name    = "excerpt of"
reverse = "has excerpt"
color   = "#f0a64f"

[firstrun]
# On first run, offer to add these folders as sources (existing ones only; the user confirms).
# "@videos" -> the OS "Videos" library folder.
suggest_sources   = ["@videos"]
